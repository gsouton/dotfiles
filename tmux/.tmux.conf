# ---------------------------------------------------------------------------
# Terminal
# ---------------------------------------------------------------------------
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc"
set -ga terminal-overrides ",$TERM:RGB"

# Fix Shift+Enter for Claude Code (kitty keyboard protocol / extended keys)
set -g extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'tmux-256color:extkeys'

set-option -sg escape-time 10
set-option -g focus-events on

# Mouse: scroll, click panes, drag-select copy
set -g mouse on

# Allow nested programs (nvim, less, etc.) to write to the system clipboard via
# OSC 52 escape sequences. Lets clipboard work through SSH without xclip/pbcopy
# on the remote — the local terminal emulator handles it.
set -g set-clipboard on

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g base-index 1
set -g status-style 'bg=#333333 fg=#5eacd3'

bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# ---------------------------------------------------------------------------
# Copy mode (vi)
# ---------------------------------------------------------------------------
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# Copy to system clipboard — cross-platform.
# Each conditional sets the `y` binding; the last match wins, so order is:
#   xclip (X11)  →  wl-copy (Wayland)  →  pbcopy (macOS)
# On systems with both X11 and Wayland clipboards, wl-copy wins over xclip.
if-shell "command -v xclip >/dev/null"   "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
if-shell "command -v wl-copy >/dev/null" "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy"
if-shell "command -v pbcopy >/dev/null"  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel pbcopy"

# Fix auto-scroll: don't exit copy-mode when new output arrives via mouse drag
bind-key -T copy-mode-vi MouseDragEnd1Pane \
  if-shell -F "#{?#{scroll_position},1,}" \
  "send-keys -X copy-pipe" \
  "send-keys -X copy-pipe-and-cancel"

# Enter copy-mode on scroll up; controlled scroll speed
bind -n WheelUpPane if-shell -F "#{pane_in_mode}" "send-keys -X scroll-up" "copy-mode"
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# ---------------------------------------------------------------------------
# Pane splitting
# ---------------------------------------------------------------------------
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Pane switching — vim-aware (works with vim-tmux-navigator nvim plugin)
# When focus is in nvim, C-hjkl is forwarded to nvim. Otherwise tmux switches panes.
# ---------------------------------------------------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"
bind-key -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
